        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"

  @if (stateService.connectingSourceNodeId()) {
  <div class="wire-guide-tip">Drawing connection. Click target node's top port to connect.</div>
  }

  <!-- Target HTML5 Canvas element -->
  <canvas
    #canvasEl
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp($event)"
    (mouseleave)="onMouseUp($event)"
    (dragover)="onDragOver($event)"
    (drop)="onDrop($event)"
  ></canvas>
</div>
