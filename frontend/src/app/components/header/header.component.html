<header class="header">
  <div class="logo-area">
    <div class="logo-text">
      <h1 class="logo-title">Adaptive Learning Path Builder</h1>
      <p class="logo-subtitle">Create conditional quiz flows with adaptive sections</p>
    </div>
  </div>

  <div class="controls-area">
    <!-- Load dropdown list -->
    <div class="dropdown-wrapper">
      <select
        id="pathSelector"
        [(ngModel)]="selectedPathId"
        (change)="onPathChange()"
        class="select-input"
      >
        <!-- <option value="" disabled selected>Load Saved Path...</option> -->
        @for (path of stateService.savedPaths(); track path.id) {
        <option [value]="path.id" [selected]="path.id === this.selectedPathId">
          {{ path.name }} (v{{ path.version }})
        </option>
        }
      </select>
    </div>

    <!-- Actions -->
    <button (click)="onCreateNew()" class="btn btn-outline" title="Create a new clean flowchart">
      <svg
        class="btn-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      New Path
    </button>

    <button class="btn btn-dark active">Builder</button>

    <button class="btn btn-outline">
      <svg
        class="btn-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
        />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      Preview
    </button>

    <div class="vertical-divider"></div>

    <button (click)="onSave()" class="btn btn-outline" title="Save path draft">
      <svg
        class="btn-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2.2"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z"
        />
      </svg>
      Save Draft
    </button>

    <button (click)="onPublish()" class="btn btn-dark" title="Publish path">
      <svg
        class="btn-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2.2"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"
        />
      </svg>
      Publish
    </button>
  </div>
</header>
